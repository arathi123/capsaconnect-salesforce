<link rel="stylesheet" href="{ basePath }/assets/styles/dxp-site-spacing-styling-hooks.min.css?{ versionKey }" />
<link rel="stylesheet" href="{ basePath }/assets/styles/dxp-styling-hooks.min.css?{ versionKey }" />
<link rel="stylesheet" href="{ basePath }/assets/styles/dxp-slds-extensions.min.css?{ versionKey }" />

<!-- General -->
<link rel="shortcut icon" href="{basePath}/assets/favicon.ico?{versionKey}">
<link rel="stylesheet" href="{basePath}/assets/css/theme2.css?{versionKey}">
<link rel="stylesheet" href="{ styles/styles.css }" />

<style>
  /* =========================
     Header background
     ========================= */
  commerce_builder-layout-header-simple .header-content,
  commerce_builder-layout-header-one .header-content {
    background: linear-gradient(to right, #033857, #0173A5) !important;
  }

  /* =========================
     Login button
     ========================= */
  button.comm-login-form__login-button {
    background-color: #0173A5 !important;
    border-color: #0173A5 !important;
    color: #ffffff !important;
  }

  /* =========================
     Header profile/cart buttons
     ========================= */
  commerce_builder-user-profile-menu,
  commerce_builder-multi-cart-badge {
    display: inline-flex !important;
    align-items: center;
    border: 1.5px solid rgba(255, 255, 255, 0.9);
    border-radius: 6px;
    padding: 6px 14px;
    margin-left: 10px;
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
  }

  commerce_builder-user-profile-menu:hover,
  commerce_builder-multi-cart-badge:hover {
    background-color: rgba(255, 255, 255, 0.12);
    border-color: #ffffff;
  }

  /* =========================
     Header search input text
     ========================= */
  commerce_builder-search-input-container input.slds-input,
  commerce_builder-search-input-container input.slds-input:focus,
  commerce_builder-search-input-container input.slds-input:active {
    color: #000 !important;
    -webkit-text-fill-color: #000 !important;
    caret-color: #000 !important;
  }

  /* =========================
     Results component theme variables
     Apply this class in Results > Style:
     capsa-results-modern
     ========================= */
  .capsa-results-modern {
    --capsa-card-radius: 18px;
    --capsa-card-border: #e3e7ee;
    --capsa-card-shadow: 0 4px 14px rgba(15, 39, 66, 0.08);
    --capsa-card-shadow-hover: 0 14px 28px rgba(15, 39, 66, 0.12);
    --capsa-text: #1f2f3d;
    --capsa-muted: #6f8094;
    --capsa-image-bg: #f3f4f6;
    --capsa-link: #0f67a2;
  }

  /* =========================
     Product card outer shell
     ========================= */
  .capsa-results-modern commerce-search-product-card .card-item,
  .capsa-results-modern .card-item,
  .capsa-results-modern article,
  .capsa-results-modern .slds-card,
  .capsa-results-modern li > div {
    background: #ffffff !important;
    border: 1px solid var(--capsa-card-border) !important;
    border-radius: var(--capsa-card-radius) !important;
    box-shadow: var(--capsa-card-shadow) !important;
    overflow: hidden !important;
    transition: transform 0.2s ease, box-shadow 0.2s ease !important;
  }

  .capsa-results-modern commerce-search-product-card .card-item:hover,
  .capsa-results-modern .card-item:hover,
  .capsa-results-modern article:hover,
  .capsa-results-modern .slds-card:hover,
  .capsa-results-modern li > div:hover {
    transform: translateY(-4px);
    box-shadow: var(--capsa-card-shadow-hover) !important;
  }

  /* =========================
     Card inner grid layout
     ========================= */
  .capsa-results-modern .cardContainerGrid {
    display: grid !important;
    grid-template-rows: auto 0 1fr !important;
    background: #ffffff !important;
  }

  .capsa-results-modern .spacerArea {
    display: none !important;
  }

  /* =========================
     IMAGE AREA WRAPPER
     ========================= */
  .capsa-results-modern .imageArea {
    background: #f3f4f6 !important;
    margin-top: 7px !important;
    margin-left: 7px !important;
    margin-right: 7px !important;
    padding: 0 !important;
    min-height: 270px !important;
    height: 280px !important;
    display: flex !important;
    align-items: stretch !important;
    justify-content: stretch !important;
    overflow: hidden !important;
  }

  /* =========================
     FORCE ALL INNER IMAGE WRAPPERS
     TO FILL THE GREY AREA
     ========================= */
  .capsa-results-modern .imageArea > *,
  .capsa-results-modern .imageArea a,
  .capsa-results-modern .imageArea div,
  .capsa-results-modern .imageArea span,
  .capsa-results-modern .imageArea picture {
    width: 100% !important;
    height: 100% !important;
    max-width: none !important;
    max-height: none !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: transparent !important;
    padding: 0 !important;
    margin: 0 !important;
    box-sizing: border-box !important;
  }

  /* =========================
     REAL PRODUCT IMAGE
     ========================= */
  .capsa-results-modern .imageArea img {
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
    max-height: 100% !important;
    min-width: 100% !important;
    min-height: 100% !important;
    object-fit: contain !important;
    object-position: center center !important;
    display: block !important;
    padding-left: 10px !important;
    padding-right: 10px !important;
    margin: 0 !important;
    background: transparent !important;
    box-sizing: border-box !important;
  }

  /* =========================
     NO-IMAGE / PLACEHOLDER
     ========================= */
  .capsa-results-modern .imageArea .slds-image,
  .capsa-results-modern .imageArea [class*="placeholder"],
  .capsa-results-modern .imageArea [class*="fallback"],
  .capsa-results-modern .imageArea lightning-primitive-icon,
  .capsa-results-modern .imageArea .slds-icon_container {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .capsa-results-modern .imageArea .slds-icon,
  .capsa-results-modern .imageArea svg {
    fill: #d6d9de !important;
    color: #d6d9de !important;
  }

  /* =========================
     Content / fields area
     ========================= */
  .capsa-results-modern .fieldsArea {
    background: #ffffff !important;
    padding: 14px 18px 20px !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    gap: 10px !important;
    text-align: center !important;
  }

  .capsa-results-modern .fieldsArea > *,
  .capsa-results-modern commerce-search-product-field,
  .capsa-results-modern commerce-search-product-price,
  .capsa-results-modern .fieldsArea a,
  .capsa-results-modern .fieldsArea div {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  /* =========================
     Product title / name
     ========================= */
  .capsa-results-modern commerce-search-product-field,
  .capsa-results-modern commerce-search-product-field > div,
  .capsa-results-modern commerce-search-product-field .slds-text-heading_medium,
  .capsa-results-modern commerce-search-product-field .slds-text-heading_medium.slds-truncate,
  .capsa-results-modern commerce-search-product-field span[part="formatted-rich-text"] {
    text-align: center !important;
    font-size: 0.88rem !important;
    line-height: 1.28 !important;
    font-weight: 500 !important;
    color: var(--capsa-text) !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
    white-space: normal !important;
    overflow: visible !important;
    text-overflow: unset !important;
    word-break: break-word !important;
    overflow-wrap: anywhere !important;
    display: block !important;
    max-width: 100% !important;
  }

  .capsa-results-modern commerce-search-product-field .slds-truncate {
    white-space: normal !important;
    overflow: visible !important;
    text-overflow: unset !important;
    display: block !important;
    max-width: 100% !important;
  }

  /* =========================
     Price
     ========================= */
  .capsa-results-modern [class*="price"],
  .capsa-results-modern .price {
    color: #111827 !important;
    font-size: 0.95rem !important;
    font-weight: 700 !important;
    margin: 0 !important;
  }

  /* =========================
     Add to cart button
     Scoped so it DOES NOT affect pagination
     ========================= */
  .capsa-results-modern .fieldsArea button,
  .capsa-results-modern .fieldsArea .slds-button,
  .capsa-results-modern .fieldsArea [class*="addToCart"],
  .capsa-results-modern commerce-search-product-card button,
  .capsa-results-modern commerce-search-product-card .slds-button,
  .capsa-results-modern commerce-search-product-card [class*="addToCart"] {
    margin-top: 4px !important;
    border-radius: 999px !important;
    background: var(--capsa-link) !important;
    border: 1px solid var(--capsa-link) !important;
    color: #ffffff !important;
    font-size: 0.9rem !important;
    font-weight: 600 !important;
    padding: 10px 20px !important;
    box-shadow: none !important;
  }

  .capsa-results-modern .fieldsArea button:hover,
  .capsa-results-modern .fieldsArea .slds-button:hover,
  .capsa-results-modern .fieldsArea [class*="addToCart"]:hover,
  .capsa-results-modern commerce-search-product-card button:hover,
  .capsa-results-modern commerce-search-product-card .slds-button:hover,
  .capsa-results-modern commerce-search-product-card [class*="addToCart"]:hover {
    background: #0b588b !important;
    border-color: #0b588b !important;
  }

  /* =========================
     Pagination
     White square buttons, active page blue
     ========================= */
  .capsa-results-modern commerce-search-paging-control {
    display: block !important;
    padding-top: 10px !important;
    padding-bottom: 10px !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 14px !important;
    margin-top: 20px !important;
    background: transparent !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.slds-button {
    min-width: 36px !important;
    width: 36px !important;
    height: 36px !important;
    padding: 0 !important;
    margin: 0 !important;
    border-radius: 0 !important;
    border: 1px solid #b8b8b8 !important;
    background: #ffffff !important;
    color: #6b7280 !important;
    box-shadow: none !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 0.95rem !important;
    font-weight: 600 !important;
    line-height: 1 !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.slds-button:hover {
    background: #f8fafc !important;
    border-color: #9ca3af !important;
    color: #374151 !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-button {
    background: #ffffff !important;
    border: 1px solid #b8b8b8 !important;
    color: #374151 !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-button.selected,
  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-button[aria-current="page"],
  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-button[aria-pressed="true"] {
    background: #0f67a2 !important;
    border-color: #0f67a2 !important;
    color: #ffffff !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction {
    background: #ffffff !important;
    border: 1px solid #b8b8b8 !important;
    color: transparent !important;
    position: relative !important;
    font-size: 0 !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction:hover {
    background: #f8fafc !important;
    border-color: #9ca3af !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction svg,
  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction lightning-primitive-icon,
  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction span {
    display: none !important;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction[aria-label="Previous"]::before {
    content: "‹";
    font-size: 28px;
    line-height: 1;
    color: #6b7280;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction[aria-label="Next"]::before {
    content: "›";
    font-size: 28px;
    line-height: 1;
    color: #6b7280;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction:disabled,
  .capsa-results-modern commerce-search-paging-control .pageControlPart button.nav-direction[aria-disabled="true"] {
    opacity: 0.45 !important;
    cursor: not-allowed !important;
  }
</style>
