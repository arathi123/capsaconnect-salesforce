<template>
    <div class="results-page-container">
        <template if:true={isLoading}>
            <div class="full-page-loader">
                <lightning-spinner alternative-text="Generating Quote..." size="large" variant="brand"></lightning-spinner>
            </div>
        </template>

        <div class="results-header">
            <h2 class="title">Woodblend Configuration Results</h2>
            <hr class="header-divider" />
        </div>
       
        <div class="results-main-content">
            
            <div class="summary-section">
                <h3 class="summary-title">Generated Cart Code</h3>
                <div class="code-box">
                    <p class="cart-code">{summaryData.packageSku}</p>
                </div>
            </div>

            <template if:true={isUnlistedCart}>
                <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_medium">
                    ⚠️ <b>Unlisted Cart:</b> 
                    We dont have have product Against this cart configuration , therefor it will come under unlisted cart field and Quote line will not be created against this.
                </div>
            </template>
     
            <template if:true={hasOptions}>
                <div class="summary-section slds-m-top_large">
                    <h3 class="summary-title">Selected Options</h3>
                    <ul class="summary-list">
                        <template if:true={hasHandle}>
                            <li class="summary-item">
                                <span class="bullet">•</span> <strong>Handle:</strong> {handle.displayValue}
                            </li>
                        </template>
                        <template if:true={hasPullOutSurface}>
                            <li class="summary-item">
                                <span class="bullet">•</span> <strong>Pull-Out Surface:</strong> {pullOutSurface.displayValue}
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <template if:true={hasAccessories}>
                <div class="summary-section slds-m-top_large">
                    <h3 class="summary-title">Selected Accessories</h3>
                    <ul class="summary-list">
                        <template for:each={summaryData.accessories} for:item="acc">
                            <li class="summary-item" key={acc.id}>
                                <span class="bullet">•</span> {acc.label} 
                                <span class="qty-badge" if:true={acc.quantity}>Qty: {acc.quantity}</span>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <!--  ADDED: Selected Tray -->
            <template if:true={hasTray}>
                <div class="summary-section slds-m-top_large">
                    <h3 class="summary-title">Selected Tray</h3>
                    <ul class="summary-list">
                        <li class="summary-item">
                            <span class="bullet">•</span> {summaryData.tray.label} - {summaryData.tray.key}
                        </li>
                    </ul>
                </div>
            </template>

            <div class="action-section slds-m-top_xx-large">
                <template if:true={isReconfigureMode}>
                    <button
                        class="quote-btn"
                        onclick={handleUpdateQuote}>

                        UPDATE QUOTE
                    </button>
                </template>

                <template if:false={isReconfigureMode}>
                    <button
                        class="quote-btn"
                        onclick={handleQuoteRequest}>

                        REQUEST A QUOTE
                    </button>
                </template>
            </div>

        </div>
    </div>
</template>
