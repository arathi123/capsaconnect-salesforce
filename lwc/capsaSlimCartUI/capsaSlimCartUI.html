<template>
    <!-- Path Bar -->
    <div class="path-wrapper">
        <c-cart-path-bar 
            product-family={productType} 
            current-step={currentStep} 
            enabled-steps={allowedSteps}
            onchildevent={handlePathSelection}
            onbacktoproducts={handleResetFlow}>
        </c-cart-path-bar>
    </div>

    <!-- Landing Page -->
    <template if:true={showLandingPage}>
        <div class="slds-grid slds-wrap">
            <!-- Left: Text Content -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12">
                <div class="page-container">
                    <h1 class="title">Configure Your Own SlimCart Documentation Cart</h1>
                    <hr>
                    <p class="description">
                        Use this guided and interactive configuration tool to walk through the process of selecting the
                        right product to best meet your exact clinical and health IT requirements.
                    </p>
                    <button class="build-btn" onclick={handleBuildClick}>
                        LET'S GET STARTED!
                    </button>
                </div>
            </div>

            <!-- Right: Image Preview -->
            <div class="slds-grid slds-wrap slds-grid_vertical-align-start">
                <div class="preview-block">
                    <div class="preview-header">YOUR SELECTION</div>
                    <div class="preview-subheader">Representative Image</div>
                    <div class="image-container">
                        <img src={currentPreviewImage} alt="SlimCart Documentation Cart" class="cart-image"/>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Loading State -->
    <template if:true={isLoading}>
        <div class="spinner-container">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Configurator Component -->
    <template if:false={isLoading}>
        <template if:true={showBuildYourOwn}>
            <c-capsa-slim-cart-build
                opportunity-id={opportunityId} 
                product-type={productType} 
                quote-id={quoteId}
                onstepchange={handleStepChange} 
                onresetflow={handleResetFlow}>
            </c-capsa-slim-cart-build>
        </template>
    </template>
</template>
