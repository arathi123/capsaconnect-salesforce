<template>
    <div class="use-case-container fade-in">
        
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                
                <h2 class="title">Step 7. Select Storage & Security</h2>
                <hr>
                <div class="options-list">
                    <template for:each={storageOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div 
                                class={opt.rowClass} 
                                data-key={opt.Option_Key__c} 
                                onclick={handleStorageSelect}>
                                
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>
                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                </div>

                <template if:true={showBinOptions}>
                    <div class="fade-in slds-m-top_x-large">
                        <h2 class="title">Please choose Bin Type</h2>
                        <hr>
                        
                        <div class="drawer-grid">
                            <template for:each={binOptions} for:item="opt">
                                <div key={opt.Option_Key__c} 
                                     class={opt.cardClass}
                                     data-key={opt.Option_Key__c}
                                     data-override={opt.Next_Step_Override__c}
                                     data-preview={opt.Display_Image_URL__c}
                                     onclick={handleBinSelect}>
                                    
                                    <div class="card-content">
                                        <template if:true={opt.Display_Image_URL__c}>
                                            <img src={opt.Display_Image_URL__c} alt={opt.Option_Label__c} class="drawer-img" />
                                        </template>
                                        
                                        <div class="radio-row">
                                            <input type="radio" checked={opt.isSelected} readonly style="margin-top: 4px;" />
                                            <div style="text-align: left;">
                                                <div class="color-name">{opt.Option_Label__c}</div>
                                                <template if:true={opt.Description__c}>
                                                    <div class="option-desc" style="color:#e98300; font-weight:600; margin-top: 2px;">
                                                        {opt.Description__c}
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in"/>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
