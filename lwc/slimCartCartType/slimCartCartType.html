<template>
    <div class="use-case-container fade-in">

        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                <h2 class="title">Select Type of Cart and Computing Interface</h2>
                <div class="options-list">
                    <template for:each={useCaseOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div class={opt.rowClass} data-key={opt.Option_Key__c} onmouseenter={handleMouseEnter}
                                onmouseleave={handleMouseLeave} onclick={handleSelect}>

                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>

                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                    <template if:true={selectedLaptop}>
                        <div class="header-row">
                        <h2 class="title">Select Optional Laptop Security Bar</h2>
                        <img src={laptopimage} alt="laptop Preview" class="laptop-img fade-in" />
                        </div>
                        <div class="options-list">
                        <template for:each={laptopSecurityOptions} for:item="opt">

                            <div key={opt.Option_Key__c}>
                                <div class={opt.rowClass} data-key={opt.Option_Key__c} onmouseenter={handleMouseEnter}
                                    onmouseleave={handleMouseLeave} onclick={handleYesNo}>

                                    <div class="text-block">
                                        <div class="option-title">{opt.Option_Label__c}</div>
                                    </div>
                                    <hr>
                                    <input type="radio" checked={opt.isSelected} readonly/>
                                </div>
                                <hr>
                            </div>
                        </template>
                        </div>
                        <hr>
                    </template>
                    <template if:true={selectedMonitor}>
                        <div class="fade-in slds-m-top_x-large">
                            <h2 class="title">Select Monitor Mount</h2>
                            <div class="options-list">
                                <template for:each={monitorMount} for:item="opt">
                                    <div key={opt.Option_Key__c}>
                                        <div class={opt.rowClass} data-key={opt.Option_Key__c}
                                            onmouseenter={handleMouseEnter} onmouseleave={handleMouseLeave}
                                            onclick={handleMonitorMount}>

                                            <div class="text-block">
                                                <div class="option-title">{opt.Option_Label__c}</div>
                                            </div>

                                            <input type="radio" checked={opt.isSelected}  readonly/>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <hr>
                        </div>
                    </template>
                    <template if:true={showMonitorKeyboard}>
                        <h2 class="title">Would you like to add a keyboard tray?</h2>
                        <div class="options-list">
                        <template for:each={monitorKeyboardOptions} for:item="opt">
                            <div key={opt.Option_Key__c}>
                                <div class={opt.rowClass} data-key={opt.Option_Key__c} onmouseenter={handleMouseEnter}
                                    onmouseleave={handleMouseLeave} onclick={handleMonitorYesNo}>

                                    <div class="text-block">
                                        <div class="option-title">{opt.Option_Label__c}</div>
                                    </div>

                                    <input type="radio" checked={opt.isSelected} readonly/>
                                </div>
                                <hr>
                            </div>
                        </template>
                    </div>
                    </template>
                    <template if:true={selectedTablet}>
                        <div class="fade-in slds-m-top_x-large">
                            <h2 class="title">Select Tablet Mount</h2>
                            <div class="options-list">
                                <template for:each={tabletMountOptions} for:item="opt">
                                    <div key={opt.Option_Key__c}>
                                        <div class={opt.rowClass} data-key={opt.Option_Key__c}
                                           onmouseenter={handleMouseEnter} onmouseleave={handleMouseLeave}
                                            onclick={handleTablet}>

                                            <div class="text-block"
                                                style="display: flex; align-items: center; gap: 15px;">
                                                <template if:true={opt.Image_URL__c}>
                                                    <img src={opt.Image_URL__c}
                                                        style="width: 50px; height: 50px; object-fit: contain; border: 1px solid #ccc; border-radius: 4px;"
                                                        alt={opt.Option_Label__c} />
                                                </template>
                                                <div>
                                                    <div class="option-title">{opt.Option_Label__c}</div>
                                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                                        {opt.Description__c}
                                                    </div>
                                                </div>
                                            </div>

                                            <input type="radio" checked={opt.isSelected} />
                                        </div>
                                        <hr>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>
            <div class="image-box">
                <div class="preview-header">YOUR SELECTION</div>
                <div class="preview-subheader">Representative Image</div>
            
                <!-- APPEND THIS WRAPPER instead of current img + selection-details -->
                <div class="preview-content">
                    <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in" />
                    <div class="selection-details fade-in" if:true={localSelection}>
                        <div>Cart Type: {cartTypeText}</div>
                        <template if:true={securityBarText}>
                            <div>Laptop Security Bar: {securityBarText}</div>
                        </template>
                        <template if:true={monitorMountdesc}>
                            <div>Mount: Monitor Mount with Column Riser - 207056</div>
                        </template>
                        <template if:true={monitorKeyboard}>
                            <div>Keyboard Tray:{monitorkeyBoardText}</div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
