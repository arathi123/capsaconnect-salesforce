<template>
    <template if:true={showAccessoryPackages}>
        <c-cart-path-bar current-step="Accessories"></c-cart-path-bar>
        <div class="slds-m-around_large">
            <h2 class="title">Accessory Packages</h2>
            <hr>
            <p class="subtitle">
                Choose one of the following convenient accessory packages to support
                your facility's workflow, storage and organizational requirements.
            </p>
            <button data-id="package1" onclick={handleSelectPackage}>
                <div data-id="package1" class="packages-container">
                    <div class="package-card">
                        <div class="package-images">
                            <img src={package1}  alt="Package 1" />
                        </div>
                    </div>
                </div> 
            </button>
            <br>
            <br>
            <!--PACKAGE 2-->
            <button data-id="package2" onclick={handleSelectPackage}>
                <div data-id="package2" class="packages-container">
                    <div class="package-card">
                        <div class="package-images">
                            <img src={package2} alt="Package 2" />
                        </div>
                    </div>
                </div>
            </button>
            <!--PACKAGE 3-->
            <button data-id="package3" onclick={handleSelectPackage}>
                <div data-id="package3" class="packages-container">
                    <div class="package-card">
                        <div class="package-images">
                            <img src={package3} alt="Package 2" />
                        </div>
                    </div>
                </div>
            </button>
            <div class="btn-container">
                <button class="view-btn" onclick={handleViewResults}>VIEW RESULTS</button>
            </div>
        </div>
    </template>
    <template if:false={isLoading}>
    <template if:true={showViewResults}>
        <c-view-results selected-cart={selectedCart} selected-accessories={selectedAccessories} selected-height={selectedHeight}
        ></c-view-results>
    </template>
    </template>
    <template if:true={isLoading}>
        <div class="slds-is-relative" style="height: 100px;"> <!-- Container for positioning -->
           <div class="Spinner Container"><lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
      </div> 
        </div>
    </template>
</template>
