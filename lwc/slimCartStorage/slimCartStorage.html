<template>
    <div class="use-case-container fade-in">
        
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                <h3 class="title">Storage</h3>
                <h2>Flexible storage options include single or dual removable drawers with keyed locks for secure, efficient storage. Integrated dividers help organize supplies and keep essentials within easy reach. Please note that storage options are not available when a keyboard tray is selected.</h2>
                <div class="options-list">
                    <template for:each={useCaseOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div 
                                class={opt.rowClass} 
                                data-key={opt.Option_Key__c} 
                                onmouseenter={handleMouseEnter} 
                                onmouseleave={handleMouseLeave} 
                                onclick={handleSelect}>
                                
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>
                                
                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                </div>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in"/>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
