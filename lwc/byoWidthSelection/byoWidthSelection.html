<template>
    <div class="container">
        <h2 class="title">Cart Width</h2>
        <hr>
        <p class="subtitle">Choose a width that meets your capacity and workflow requirements.</p>

        <div class="width-grid">
            <template for:each={widthOptions} for:item="item">
                <div key={item.Option_Key__c} 
                     class={item.cardClass}
                     data-key={item.Option_Key__c}
                     onmouseenter={handleMouseEnter}
                     onmouseleave={handleMouseLeave}
                     onclick={handleSelect}>
                    
                    <div class="card-content">
                        <img src={item.Image_URL__c} alt={item.Option_Label__c} class="cart-img" />
                        
                        <div class="radio-row">
                            <input type="radio" name="width" value={item.Option_Key__c} checked={item.isSelected} />
                            <label class="cart-name">{item.Option_Label__c}</label>
                        </div>

                        <div class="description-container">
                            <p if:true={item.showDesc} class="cart-subtext fade-in">
                                {item.Description__c}
                            </p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <hr>
        <div if:true={showNextButton} class="footer-area">
            <button class="next-btn" onclick={handleNext}>NEXT</button>
        </div>
    </div>
</template>
