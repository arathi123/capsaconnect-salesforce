<template>
    <lightning-modal-header label="Delete Quote"></lightning-modal-header>
    <lightning-modal-body>
        <p>Are you sure you want to delete this quote? This action cannot be undone.</p>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
        <lightning-button variant="destructive" label="Delete" onclick={handleConfirm}></lightning-button>
    </lightning-modal-footer>
</template>
