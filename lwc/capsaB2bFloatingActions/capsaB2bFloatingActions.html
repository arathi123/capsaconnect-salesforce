<template>
    <!-- ── Feedback Vertical Tab ── -->
    <div class="feedback-tab" onclick={toggleFeedback} role="button" tabindex="0" aria-label="Open Feedback">
        <svg class="tab-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
        <span class="tab-text">Feedback</span>
    </div>

    <!-- ── Chat FAB ── -->
    <button class="chat-fab" onclick={toggleChat} aria-label="Open Chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
    </button>

    <!-- ── Feedback Drawer ── -->
    <template if:true={showFeedback}>
        <div class="backdrop" onclick={closeFeedback}></div>
        <div class="feedback-drawer" role="dialog" aria-modal="true" aria-label="Feedback">
            <div class="drawer-header">
                <span class="drawer-title">Feedback</span>
                <button class="drawer-close" onclick={closeFeedback} aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <p class="drawer-subtitle">Help us improve by sharing your feedback</p>
            <div class="drawer-body">
                <template if:false={feedbackSubmitted}>
                    <label class="feedback-label">Your Feedback</label>
                    <textarea
                        class="feedback-textarea"
                        placeholder="Share your thoughts, suggestions, or report an issue..."
                        oninput={handleFeedbackInput}
                    ></textarea>
                    <button class="submit-btn" onclick={submitFeedback} disabled={isFeedbackEmpty}>
                        Submit Feedback
                    </button>
                </template>
                <template if:true={feedbackSubmitted}>
                    <div class="success-state">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0173A5" width="52" height="52">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p class="success-msg">Thank you for your feedback!</p>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- ── Chat Widget ── -->
    <template if:true={showChat}>
        <div class="chat-widget" role="dialog" aria-modal="true" aria-label="CapsaConnect Chat">
            <div class="chat-widget-header">
                <button class="new-chat-btn" onclick={resetChat}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="13" height="13">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                    New Chat
                </button>
                <button class="chat-close-btn" onclick={closeChat} aria-label="Close Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="chat-widget-body">

                <!-- ── Step 1: Product options ── -->
                <template if:true={isOptionsView}>
                    <div class="astral-logo">
                        <svg viewBox="0 0 80 62" xmlns="http://www.w3.org/2000/svg">
                            <rect x="6"  y="2"  width="68" height="11" rx="3" fill="#0d3b5a"/>
                            <rect x="6"  y="16" width="68" height="11" rx="3" fill="#0d3b5a" opacity="0.77"/>
                            <rect x="6"  y="30" width="68" height="11" rx="3" fill="#0d3b5a" opacity="0.54"/>
                            <rect x="6"  y="44" width="68" height="11" rx="3" fill="#0d3b5a" opacity="0.31"/>
                        </svg>
                    </div>
                    <h2 class="chat-main-title">How May I Help You Today!</h2>
                    <div class="chat-intro-card">
                        <p class="chat-intro-text">Hi, I'm here to help you with manuals, guides, and implementation support.</p>
                        <p class="chat-prompt-text">To get started, please select one of the options below</p>
                    </div>
                    <div class="chat-options-grid">
                        <template for:each={chatOptions} for:item="opt">
                            <button key={opt.id} class="chat-option-btn" data-label={opt.label} onclick={handleChatOption}>
                                <svg class="opt-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
                                    <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
                                </svg>
                                <span>{opt.label}</span>
                            </button>
                        </template>
                    </div>
                </template>

                <!-- ── Step 2: Pre-chat form ── -->
                <template if:true={isFormView}>
                    <div class="prechat">
                        <button class="prechat-back" onclick={backToOptions}>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                            </svg>
                            Back
                        </button>
                        <span class="prechat-product">{selectedProduct}</span>
                        <h3 class="prechat-title">Let's get you connected</h3>
                        <p class="prechat-sub">Share a few details and an agent will start chatting with you.</p>

                        <div class="fld-row">
                            <div class="fld-group">
                                <label class="fld-label">First Name <span class="req">*</span></label>
                                <input class="fld-input" type="text" data-field="firstName" value={firstName} oninput={handleFieldChange} placeholder="First name"/>
                            </div>
                            <div class="fld-group">
                                <label class="fld-label">Last Name <span class="req">*</span></label>
                                <input class="fld-input" type="text" data-field="lastName" value={lastName} oninput={handleFieldChange} placeholder="Last name"/>
                            </div>
                        </div>
                        <div class="fld-group">
                            <label class="fld-label">Email <span class="req">*</span></label>
                            <input class="fld-input" type="email" data-field="email" value={email} oninput={handleFieldChange} placeholder="you@company.com"/>
                        </div>
                        <div class="fld-group">
                            <label class="fld-label">Mobile <span class="req">*</span></label>
                            <input class="fld-input" type="tel" data-field="mobile" value={mobile} oninput={handleFieldChange} placeholder="(555) 123-4567"/>
                        </div>
                        <div class="fld-group">
                            <label class="fld-label">Subject <span class="req">*</span></label>
                            <input class="fld-input" type="text" data-field="subject" value={subject} oninput={handleFieldChange} placeholder="How can we help?"/>
                        </div>

                        <button class="start-chat-btn" onclick={startChatting} disabled={isFormIncomplete}>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                            </svg>
                            Start Chatting
                        </button>
                    </div>
                </template>

                <!-- ── Step 3: Live chat ── -->
                <template if:true={isChatView}>
                    <div class="livechat">
                        <div class="livechat-agentbar">
                            <span class="agent-avatar">CS</span>
                            <div class="agent-meta">
                                <span class="agent-name">Capsa Support</span>
                                <span class="agent-status"><i class="status-dot"></i>Online</span>
                            </div>
                        </div>
                        <div class="livechat-thread">
                            <template for:each={messages} for:item="m">
                                <div key={m.id} class={m.cssClass}>
                                    <span class="msg-sender">{m.sender}</span>
                                    <span class="msg-bubble">{m.text}</span>
                                </div>
                            </template>
                        </div>
                        <div class="livechat-input-row">
                            <input
                                class="chat-msg-input"
                                type="text"
                                placeholder="Type your message..."
                                value={newMessage}
                                oninput={handleMessageInput}
                                onkeydown={handleMessageKey}
                            />
                            <button class="msg-send-btn" onclick={sendMessage} aria-label="Send message">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </template>

            </div>
        </div>
    </template>
</template>
