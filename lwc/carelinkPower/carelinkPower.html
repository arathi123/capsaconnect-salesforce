<template>
    <div class="use-case-container fade-in">
        
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                
                <h2 class="title">Step 2. Select Power Option</h2>
                <p class="slds-m-bottom_medium step-description">Select the power option and power cord that best meets your Mobile Nurse Workstation requirement.</p>
                <hr>

                <div class="options-list">
                    <template for:each={filteredPowerOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div 
                                class={opt.rowClass} 
                                data-key={opt.Option_Key__c} 
                                onmouseenter={handlePowerMouseEnter} 
                                onmouseleave={handlePowerMouseLeave} 
                                onclick={handlePowerSelect}>
                                
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>
                                
                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                </div>

                <template if:true={selectedPower}>
                    <div class="fade-in slds-m-top_x-large">
                        <h2 class="title">Select Power Cord</h2>
                        <hr>
                        
                        <div class="options-list">
                            <template for:each={visibleCordOptions} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div 
                                        class={opt.rowClass} 
                                        data-key={opt.Option_Key__c} 
                                        onmouseenter={handleCordMouseEnter}
                                        onmouseleave={handleCordMouseLeave}
                                        onclick={handleCordSelect}>
                                        
                                        <div class="text-block flex-text-block">
                                            <template if:true={opt.Image_URL__c}>
                                                <img src={opt.Image_URL__c} class="cord-thumbnail" alt={opt.Option_Label__c}/>
                                            </template>
                                            <div>
                                                <div class="option-title">{opt.Option_Label__c}</div>
                                                <div if:true={opt.isVisible} class="option-desc fade-in">
                                                    {opt.Description__c}
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <input type="radio" checked={opt.isSelected} readonly />
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={selectedCord}>
                    <div class="fade-in slds-m-top_x-large">
                        <h2 class="title">Select Additional Inverter</h2>
                        <p class="slds-m-bottom_medium step-description">
                            The CareLink Nurse Workstation comes standard with an AC inverter and 3-outlet strip for 150 watts of power output. Choose below to add an additional inverter with 3 additional outlets to increase the total power output to 300 watts.
                        </p>
                        <hr>
                        
                        <div class="options-list">
                            <template for:each={visibleInverterOptions} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div 
                                        class={opt.rowClass} 
                                        data-key={opt.Option_Key__c} 
                                        onclick={handleInverterSelect}>
                                        
                                        <div class="text-block">
                                            <div class="option-title">{opt.Option_Label__c}</div>
                                        </div>
                                        
                                        <input type="radio" checked={opt.isSelected} readonly />
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in"/>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
