<template>
    <div class="use-case-container fade-in">

        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                <h2 class="title">Select Keyboard Arm Option</h2>
                <!-- <hr> -->
                <div class="options-list">
                    <template for:each={keyBoardOpts} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div class={opt.rowClass} data-key={opt.Option_Key__c} onmouseenter={handleMouseEnter}
                                onmouseleave={handleMouseLeave} onclick={handleKeySelect}>
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>
                                <div class="radio-container">
                                    <input type="radio" checked={opt.isSelected} readonly />
                                </div>
                            </div>
                            <hr>
                        </div>
                    </template>
                    <template if:true={selectedFix}>
                        <!-- <div class="fade-in slds-m-top_x-large"> -->
                        <div>
                            <h2 class="title">Select Fixed Height Keyboard Arm Option</h2>
                            <template for:each={fixHeightOpts} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div class={opt.rowClass} data-key={opt.Option_Key__c}
                                        onmouseenter={handleMouseEnter} onmouseleave={handleMouseLeave}
                                        onclick={handleFixSelect}>
                                        <div class="text-block">
                                            <div class="option-title">{opt.Option_Label__c}</div>
                                            <div if:true={opt.isVisible} class="option-desc fade-in">
                                                {opt.Description__c}
                                            </div>
                                        </div>
                                        <div class="radio-container">
                                            <input type="radio" checked={opt.isSelected} readonly />
                                        </div>
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:true={selectedHeight}>
                        <!-- <div class="fade-in slds-m-top_x-large"> -->
                        <div>
                            <h2 class="title">Select Height Adjustable Keyboard Arm Option</h2>
                            <template for:each={heightAdjOpts} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div class={opt.rowClass} data-key={opt.Option_Key__c}
                                        onmouseenter={handleMouseEnter} onmouseleave={handleMouseLeave}
                                        onclick={handleHAdjSelect}>
                                        <div class="text-block">
                                            <div class="option-title">{opt.Option_Label__c}</div>
                                            <div if:true={opt.isVisible} class="option-desc fade-in">
                                                {opt.Description__c}
                                            </div>
                                        </div>
                                        <div class="radio-container">
                                            <input type="radio" checked={opt.isSelected} readonly />
                                        </div>
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <!-- <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in" />
                    </div>
                </div>
            </div> -->
            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="preview-label">YOUR SELECTION</div>
                    <div class="preview-sublabel">Representative Image</div>

                    <div class="canvas-container">
                        <img src={baseImage} alt="Track" class="track-img" />

                        <template for:each={incomingOverlays} for:item="ov">
                            <img key={ov.key} src={ov.url} alt={ov.key} class="arm-overlay"/>
                        </template>

                        <template lwc:if={currentPreviewImage}>
                            <img src={overlayData.image} alt="keyBoardArm" class={overlayData.style} />
                        </template>
                    </div>

                    <div class="captions">
                        <div lwc:if={localSelection} class="caption-line"><strong>Track:</strong> {localSelection}</div>
                        <div lwc:if={currentArmSelection} class="caption-line"><strong>Arm:</strong> {currentArmSelection}</div>
                        <div lwc:if={currentkeyBoardArm} class="caption-line"><strong>Keyboard Arm:</strong> {currentkeyBoardArm}</div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
