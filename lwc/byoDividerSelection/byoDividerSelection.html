<template>

    <div class="shell-container">

        <!-- LOADER -->

        <template if:true={isLoading}>

            <div class="spinner-container">

                <lightning-spinner
                    alternative-text="Loading..."
                    size="medium">
                </lightning-spinner>

            </div>

        </template>

        <!-- MAIN -->

        <template if:false={isLoading}>

            <!-- MATERIAL -->

            <template if:true={materialOptions.length}>

                <div class="question-block fade-in">

                    <h3 class="question-title">
                        Select Divider Material
                    </h3>

                    <div class="option-grid">

                        <template
                            for:each={materialOptions}
                            for:item="opt">

                            <div
                                key={opt.Option_Key__c}
                                class={opt.cardClass}
                                data-section="material"
                                data-key={opt.Option_Key__c}
                                onclick={handleSelect}>

                                <div class="card-inner">

                                    <div class="radio-row">

                                        <input
                                            type="radio"
                                            checked={opt.isSelected}
                                            readonly />

                                        <label>
                                            {opt.Option_Label__c}
                                        </label>

                                    </div>

                                    <div
                                        if:true={opt.Description__c}
                                        class="tooltip">

                                        {opt.Description__c}

                                    </div>

                                </div>

                            </div>

                        </template>

                    </div>

                </div>

            </template>

            <!-- HEIGHT -->

            <template if:true={heightOptions.length}>

                <div class="question-block fade-in">

                    <h3 class="question-title">
                        Select Divider Height
                    </h3>

                    <div class="option-grid">

                        <template
                            for:each={heightOptions}
                            for:item="opt">

                            <div
                                key={opt.Option_Key__c}
                                class={opt.cardClass}
                                data-section="height"
                                data-key={opt.Option_Key__c}
                                onclick={handleSelect}>

                                <div class="card-inner">

                                    <div class="radio-row">

                                        <input
                                            type="radio"
                                            checked={opt.isSelected}
                                            readonly />

                                        <label>
                                            {opt.Option_Label__c}
                                        </label>

                                    </div>

                                    <div
                                        if:true={opt.Description__c}
                                        class="tooltip">

                                        {opt.Description__c}

                                    </div>

                                </div>

                            </div>

                        </template>

                    </div>

                </div>

            </template>

            <!-- CORRESPONDING SHELL -->

            <template if:true={correspondingOptions.length}>

                <div class="question-block fade-in">

                    <h3 class="question-title">
                        Select Divider Corresponding Shell
                    </h3>

                    <div class="option-grid">

                        <template
                            for:each={correspondingOptions}
                            for:item="opt">

                            <div
                                key={opt.Option_Key__c}
                                class={opt.cardClass}
                                data-section="corresponding"
                                data-key={opt.Option_Key__c}
                                onclick={handleSelect}>

                                <div class="card-inner">
                        <img src={opt.Image_URL__c} class="div">
                                    <div class="radio-row">

                                        <input
                                            type="radio"
                                            checked={opt.isSelected}
                                            readonly />

                                        <label>
                                            {opt.Option_Label__c}
                                        </label>

                                    </div>

                                    <div
                                        if:true={opt.Description__c}
                                        class="tooltip">

                                        {opt.Description__c}

                                    </div>

                                </div>

                            </div>

                        </template>

                    </div>

                </div>

            </template>

            <!-- COLUMNS -->

            <template if:true={columnOptions.length}>

                <div class="question-block fade-in">

                    <h3 class="question-title">
                        Select Columns Of Storage
                    </h3>

                    <div class="option-grid">

                        <template
                            for:each={columnOptions}
                            for:item="opt">

                            <div
                                key={opt.Option_Key__c}
                                class={opt.cardClass}
                                data-section="columns"
                                data-key={opt.Option_Key__c}
                                onclick={handleSelect}>

                                <div class="card-inner">

                                    <div class="radio-row">

                                        <input
                                            type="radio"
                                            checked={opt.isSelected}
                                            readonly />

                                        <label>
                                            {opt.Option_Label__c}
                                        </label>

                                    </div>

                                    <div
                                        if:true={opt.Description__c}
                                        class="tooltip">

                                        {opt.Description__c}

                                    </div>

                                </div>

                            </div>

                        </template>

                    </div>

                </div>

            </template>

            <!-- NEXT -->

            <template if:true={isComplete}>

                <div class="footer-area fade-in">

                    <button
                        class="next-btn"
                        onclick={handleNext}>

                        NEXT →

                    </button>

                </div>

            </template>

        </template>

    </div>

</template>
