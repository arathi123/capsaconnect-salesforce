<template>

    <div class="trio-engine-container">

       <template if:true={isUseCase}>
            <c-trio-use-case
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-use-case>
        </template>



        <template if:true={isPower}>
            <c-trio-power
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-power>
        </template>
                  

        <template if:true={isLift}>
            <c-trio-lift
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-lift>
        </template>
        <template if:true={isMonitor}>
            <c-trio-monitor
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-monitor>
        </template>

        <template if:true={isKeyboardTray}>
            <c-trio-keyboard-tray
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-keyboard-tray>
        </template>

 
        <template if:true={isStorageAndSecurity}>
            <c-trio-storage-security
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-storage-security>
        </template>
 
        <template if:true={isBuilder}>
            <c-trio-storage-builder
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-storage-builder>
        </template>
        
        <template if:true={isAdditionalStorage}>
            <c-trio-additional-storage
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-additional-storage>
        </template>

        <template if:true={isTeleAccessories}>
            <c-trio-tele-accessories
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-tele-accessories>
        </template>

   
        <template if:true={isAccessories}>
            <c-trio-accessories
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-accessories>
        </template>

        <template if:true={isWarranty}>
            <c-trio-warranty
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-trio-warranty>
        </template>

    
        <template if:true={isResults}>
            <c-trio-results
                opportunity-id={opportunityId}
                quote-id={quoteId}
                product-type={productType}
                selections={selections}>
            </c-trio-results>
        </template> 

    </div>

</template>
