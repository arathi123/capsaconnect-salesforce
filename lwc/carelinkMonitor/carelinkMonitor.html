<template>
    <div class="use-case-container fade-in">
        
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                
                <h2 class="title">Step 4. Select Monitor / Display Type</h2>
                <hr>

                <div class="options-list">
                    <template for:each={filteredMonitorOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div 
                                class={opt.rowClass} 
                                data-key={opt.Option_Key__c} 
                                onmouseenter={handleMonitorMouseEnter} 
                                onmouseleave={handleMonitorMouseLeave} 
                                onclick={handleMonitorSelect}>
                                
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                    <div if:true={opt.isVisible} class="option-desc fade-in">
                                        {opt.Description__c}
                                    </div>
                                </div>
                                
                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                </div>

                <template if:true={showMonitorTypeOptions}>
                    <div class="fade-in slds-m-top_x-large">
                        <h2 class="title">Select Monitor / Display Option</h2>
                        <hr>
                        
                        <div class="options-list">
                            <template for:each={visibleTypeOptions} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div 
                                        class={opt.rowClass} 
                                        data-key={opt.Option_Key__c} 
                                        onmouseenter={handleTypeMouseEnter}
                                        onmouseleave={handleTypeMouseLeave}
                                        onclick={handleTypeSelect}>
                                        
                                        <div class="text-block">
                                            <div class="option-title">{opt.Option_Label__c}</div>
                                            <div if:true={opt.isVisible} class="option-desc fade-in">
                                                {opt.Description__c}
                                            </div>
                                        </div>
                                        
                                        <input type="radio" checked={opt.isSelected} readonly />
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={showMountOptions}>
                    <div class="fade-in slds-m-top_x-large">
                        <h2 class="title">Select Monitor / Display Mount</h2>
                        <hr>
                        
                        <div class="options-list">
                            <template for:each={visibleMountOptions} for:item="opt">
                                <div key={opt.Option_Key__c}>
                                    <div 
                                        class={opt.rowClass} 
                                        data-key={opt.Option_Key__c} 
                                        onmouseenter={handleMountMouseEnter}
                                        onmouseleave={handleMountMouseLeave}
                                        onclick={handleMountSelect}>
                                        
                                        <div class="text-block flex-text-block">
                                            <template if:true={opt.Image_URL__c}>
                                                <img src={opt.Image_URL__c} class="mount-thumbnail" alt={opt.Option_Label__c}/>
                                            </template>
                                            <div>
                                                <div class="option-title">{opt.Option_Label__c}</div>
                                                <div if:true={opt.isVisible} class="option-desc fade-in">
                                                    {opt.Description__c}
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <input type="radio" checked={opt.isSelected} readonly />
                                    </div>
                                    <hr>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in"/>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
