<template>
    <div class="results-page-container">

        <template if:true={isLoading}>
            <div class="full-page-loader">
                <lightning-spinner alternative-text="Generating Quote..." size="large" variant="brand"></lightning-spinner>
            </div>
        </template>

        <div class="results-header">
            <h2 class="title">Configuration Summary</h2>
            <hr class="header-divider" />
        </div>

        <div class="results-main-content">

            <template if:true={hasTableTopUnit}>
                <div class="summary-section">
                    <h3 class="summary-title">Table Top Unit</h3>
                    <ul class="summary-list">
                        <li class="summary-item">
                            <span class="bullet">•</span> {summaryData.tableTopUnit.label}
                        </li>
                    </ul>
                </div>
            </template>

            <template if:true={hasWarranty}>
                <div class="summary-section slds-m-top_large">
                    <h3 class="summary-title">Warranty</h3>
                    <ul class="summary-list">
                        <li class="summary-item">
                            <span class="bullet">•</span> {summaryData.warranty.label}
                        </li>
                    </ul>
                </div>
            </template>

            <template if:true={hasService}>
                <div class="summary-section slds-m-top_large">
                    <h3 class="summary-title">Service</h3>
                    <ul class="summary-list">
                        <li class="summary-item">
                            <span class="bullet">•</span> {summaryData.service.label}
                        </li>
                    </ul>
                </div>
            </template>

            <div class="action-section slds-m-top_xx-large">
                <template if:true={isReconfigureMode}>
                    <button class="quote-btn" onclick={handleUpdateQuote}>UPDATE QUOTE</button>
                </template>
                <template if:false={isReconfigureMode}>
                    <button class="quote-btn" onclick={handleQuoteRequest}>REQUEST A QUOTE</button>
                </template>
            </div>

        </div>
    </div>
</template>
