<template>
    <div class="use-case-container fade-in">
        
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="questions-column">
                <h2 class="title">Warranty and Service Options</h2>
                 <p class="slds-text-body_regular slds-m-bottom_medium">
            The SlimCart comes with a standard 3-Year Parts Only Warranty. You may select an optional extended warranty below.                </p>
                <div class="options-list">
                    <template for:each={useCaseOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div 
                                class={opt.rowClass} 
                                data-key={opt.Option_Key__c}  
                                onclick={handleSelect}>
                                
                                <div class="text-block">
                                    <div class="option-title">{opt.Option_Label__c}</div>
                                </div>
                                
                                <input type="radio" checked={opt.isSelected} readonly />
                            </div>
                            <hr>
                        </div>
                    </template>
                </div>

                <template if:true={isStepComplete}>
                    <div class="footer-area fade-in">
                        <button class="next-btn" onclick={handleNext}>NEXT →</button>
                    </div>
                </template>
            </div>

            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">
                        <img src={currentPreviewImage} alt="Cart Preview" class="preview-img fade-in"/>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
