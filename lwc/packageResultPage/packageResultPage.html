<template>
    <div class="results-page-container">
        <template if:true={isLoading}>
            <div class="full-page-loader">
                <lightning-spinner 
                    alternative-text="Generating Quote..." 
                    size="large" 
                    variant="brand">
                </lightning-spinner>
            </div>
        </template>

        <div class="results-layout-split">
            <div class="left-content-column">
                <div class="results-header">
                    <h2 class="title">Results</h2>
                    <hr class="header-divider" />
                    <div class="intro-block">
                        <p class="intro-text">
                            Thanks! Your customized configuration is available to submit a Request For Quote, Email to Coworker,
                            or Print/Save as PDF Document.
                        </p>
                        <p class="intro-text">
                            If you were not able to precisely configure your Avalo, contact your Capsa Representative, or
                            contact us directly at <strong>800.437.6633</strong>, 
                            <a href="mailto:info@capsahealthcare.com">info@capsahealthcare.com</a>, 
                            or visit <a href="https://capsahealthcare.com" target="_blank">capsahealthcare.com</a>
                        </p>
                    </div>
                </div>

                <div class="summary-section">
                    <h3 class="summary-title">YOUR SUMMARY</h3>
                    <hr class="summary-divider" />

                    <ul class="summary-list">
                        <li class="summary-item">
                            <strong>Package Type</strong>
                            <ul class="summary-sub-list">
                                <li>{packageSummaryData.cartLabel} - {packageSummaryData.packageSku}</li>
                            </ul>
                        </li>

                        <li if:true={hasHeight} class="summary-item">
                            <strong>Height</strong>
                            <ul class="summary-sub-list">
                                <li>{packageSummaryData.height.label}</li>
                            </ul>
                        </li>

                        <li if:true={hasLock} class="summary-item">
                            <strong>Lock</strong>
                            <ul class="summary-sub-list">
                                <li>{packageSummaryData.lock.label}</li>
                            </ul>
                        </li>

                        <li if:true={hasAccessory} class="summary-item">
                            <strong>Accessories</strong>
                            <ul class="summary-sub-list">
                                <li>{packageSummaryData.accessories.label}</li>
                            </ul>
                            <div if:true={accessoryImageUrl} class="accessory-preview-box slds-m-top_medium">
                                <img src={accessoryImageUrl} alt="Accessory Package" class="accessory-image" />
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="right-image-column">
                <div class="sticky-container">
                    <div class="cart-image-wrapper">
                        <template if:true={cartImageUrl}>
                            <img src={cartImageUrl} alt="Cart Preview" class="main-cart-img fade-in" />
                        </template>
                    </div>
                    <div class="button-wrapper slds-m-top_xx-large">
                        <template if:true={isReconfigureMode}>

                            <button
                                class="btn-quote"
                                onclick={handleUpdateQuote}>

                                UPDATE QUOTE

                            </button>

                        </template>

                        <template if:false={isReconfigureMode}>

                            <button
                                class="btn-quote"
                                onclick={handleQuoteRequest}>

                                REQUEST A QUOTE

                            </button>

                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
