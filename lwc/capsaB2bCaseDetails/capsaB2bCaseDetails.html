<template>
    <div class="det-root">

        <!-- ─── Back link ─── -->
        <button type="button" class="back-link" onclick={handleBack}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>Back to cases</span>
        </button>

        <!-- ─── Loading ─── -->
        <template lwc:if={showSpinner}>
            <div class="spinner-wrap">
                <lightning-spinner alternative-text="Loading case" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ─── Detail ─── -->
        <template lwc:if={showDetail}>
            <div class="det-card">

                <!-- Header -->
                <div class="det-header">
                    <div class="det-header__main">
                        <p class="det-eyebrow">{heading}</p>
                        <h1 class="det-title">{caseRecord.caseNumber}</h1>
                        <p class="det-subject">{caseRecord.subject}</p>
                    </div>
                    <div class="det-badges">
                        <span class={caseRecord.statusClass}>
                            <span class="qbadge__dot"></span>{caseRecord.status}
                        </span>
                        <span class={caseRecord.priorityClass}>
                            <span class="qbadge__dot"></span>{caseRecord.priority}
                        </span>
                    </div>
                </div>

                <!-- Overview -->
                <section class="det-section">
                    <h2 class="det-section__title">Overview</h2>
                    <dl class="det-grid">
                        <div class="det-field">
                            <dt>Case owner</dt>
                            <dd>{caseRecord.ownerName}</dd>
                        </div>
                        <div class="det-field">
                            <dt>Account name</dt>
                            <dd>{caseRecord.accountName}</dd>
                        </div>
                        <div class="det-field">
                            <dt>Case number</dt>
                            <dd>{caseRecord.caseNumber}</dd>
                        </div>
                        <div class="det-field">
                            <dt>Priority</dt>
                            <dd>{caseRecord.priority}</dd>
                        </div>
                        <div class="det-field">
                            <dt>Status</dt>
                            <dd>{caseRecord.status}</dd>
                        </div>
                        <div class="det-field">
                            <dt>Closed reason</dt>
                            <dd>
                                <template lwc:if={caseRecord.closedReason}>{caseRecord.closedReason}</template>
                                <template lwc:else><span class="det-empty">—</span></template>
                            </dd>
                        </div>
                        <div class="det-field">
                            <dt>Date/Time opened</dt>
                            <dd>
                                <lightning-formatted-date-time value={caseRecord.openedDate}
                                    year="numeric" month="short" day="numeric"
                                    hour="2-digit" minute="2-digit">
                                </lightning-formatted-date-time>
                            </dd>
                        </div>
                        <div class="det-field">
                            <dt>Date/Time closed</dt>
                            <dd>
                                <template lwc:if={caseRecord.closedDate}>
                                    <lightning-formatted-date-time value={caseRecord.closedDate}
                                        year="numeric" month="short" day="numeric"
                                        hour="2-digit" minute="2-digit">
                                    </lightning-formatted-date-time>
                                </template>
                                <template lwc:else><span class="det-empty">—</span></template>
                            </dd>
                        </div>
                    </dl>
                </section>

                <!-- Description -->
                <section class="det-section">
                    <h2 class="det-section__title">Description</h2>
                    <template lwc:if={hasDescription}>
                        <p class="det-longtext">{caseRecord.description}</p>
                    </template>
                    <template lwc:else>
                        <p class="det-longtext det-empty">No description provided.</p>
                    </template>
                </section>

                <!-- Last case comment -->
                <section class="det-section">
                    <div class="det-section__head">
                        <h2 class="det-section__title">Last case comment</h2>
                        <template lwc:if={isEditingComment}></template>
                        <template lwc:else>
                            <button type="button" class="link-btn" onclick={handleEditComment}>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    aria-hidden="true">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
                                </svg>
                                <span>{editLabel}</span>
                            </button>
                        </template>
                    </div>

                    <template lwc:if={isEditingComment}>
                        <lightning-textarea class="comment-input" value={commentDraft}
                            max-length="5000" variant="label-hidden" label="Case comment"
                            placeholder="Add a comment for this case…"
                            onchange={handleCommentChange} disabled={isSavingComment}>
                        </lightning-textarea>
                        <div class="edit-actions">
                            <button type="button" class="btn btn--ghost"
                                onclick={handleCancelComment} disabled={isSavingComment}>
                                Cancel
                            </button>
                            <button type="button" class="btn btn--primary"
                                onclick={handleSaveComment} disabled={isSavingComment}>
                                <template lwc:if={isSavingComment}>Saving…</template>
                                <template lwc:else>Save comment</template>
                            </button>
                        </div>
                    </template>
                    <template lwc:else>
                        <template lwc:if={hasLastComment}>
                            <p class="det-longtext">{caseRecord.lastCaseComment}</p>
                        </template>
                        <template lwc:else>
                            <p class="det-longtext det-empty">No comments yet.</p>
                        </template>
                    </template>
                </section>

                <!-- Attachments -->
                <section class="det-section">
                    <h2 class="det-section__title">Attachments</h2>

                    <!-- Drop zone -->
                    <div class={dropZoneClass}
                        ondragover={handleDragOver}
                        ondragleave={handleDragLeave}
                        ondrop={handleDrop}
                        onclick={handleBrowse}>
                        <svg class="dropzone__icon" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                            stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="dropzone__title">
                            <span class="dropzone__link">Click to upload</span> or drag &amp; drop
                        </p>
                        <p class="dropzone__hint">Excel, Word, PDF, images or email • up to 2&nbsp;MB each</p>
                        <input type="file" multiple accept={acceptAttr}
                            class="visually-hidden" onchange={handlePicker} />
                    </div>

                    <template lwc:if={isUploading}>
                        <div class="upload-status">
                            <lightning-spinner alternative-text="Uploading" size="x-small"
                                variant="brand"></lightning-spinner>
                            <span>Uploading…</span>
                        </div>
                    </template>

                    <template lwc:if={uploadError}>
                        <p class="upload-error" role="alert">{uploadError}</p>
                    </template>

                    <!-- File list -->
                    <template lwc:if={hasFiles}>
                        <ul class="file-list">
                            <template for:each={files} for:item="file">
                                <li key={file.contentDocumentId} class="file-row">
                                    <span class={file.iconClass}>{file.extLabel}</span>
                                    <span class="file-meta">
                                        <span class="file-name" title={file.title}>{file.title}</span>
                                        <span class="file-sub">{file.sizeLabel}</span>
                                    </span>
                                    <div class="file-actions">
                                        <button type="button" class="file-btn"
                                            data-url={file.downloadUrl} onclick={handleDownload}
                                            title="Download">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                stroke-width="2" stroke-linecap="round"
                                                stroke-linejoin="round" aria-hidden="true">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                                <polyline points="7 10 12 15 17 10"></polyline>
                                                <line x1="12" y1="15" x2="12" y2="3"></line>
                                            </svg>
                                        </button>
                                        <template lwc:if={file.canDelete}>
                                            <button type="button" class="file-btn file-btn--danger"
                                                data-id={file.contentDocumentId} data-title={file.title}
                                                onclick={handleDelete} title="Remove">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2" stroke-linecap="round"
                                                    stroke-linejoin="round" aria-hidden="true">
                                                    <polyline points="3 6 5 6 21 6"></polyline>
                                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                                                    <path d="M10 11v6"></path>
                                                    <path d="M14 11v6"></path>
                                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                                                </svg>
                                            </button>
                                        </template>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template lwc:else>
                        <p class="det-longtext det-empty">No files attached yet.</p>
                    </template>
                </section>
            </div>
        </template>

        <!-- ─── Empty / not found ─── -->
        <template lwc:if={showEmpty}>
            <div class="det-card">
                <div class="empty-state">
                    <lightning-icon icon-name="standard:case" size="large"></lightning-icon>
                    <p class="empty-title">Case not available</p>
                    <p class="empty-text">
                        We couldn't find this case, or it isn't associated with your account.
                    </p>
                    <button type="button" class="empty-btn" onclick={handleBack}>Back to cases</button>
                </div>
            </div>
        </template>
    </div>
</template>
