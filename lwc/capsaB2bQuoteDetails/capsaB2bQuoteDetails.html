<template>
    <div class="det-root">

        <!-- ─── Back link ─── -->
        <button type="button" class="back-link" onclick={handleBack}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>Back to quotes</span>
        </button>

        <!-- ─── Loading ─── -->
        <template lwc:if={showSpinner}>
            <div class="spinner-wrap">
                <lightning-spinner alternative-text="Loading quote" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ─── Detail ─── -->
        <template lwc:if={showDetail}>

            <!-- Add-to-cart result banner -->
            <template lwc:if={reorderMsg}>
                <div class={reorderBannerClass} role="status" aria-live="polite">
                    <p class="reorder-text">{reorderMsg}</p>
                    <template lwc:if={hasSkipped}>
                        <ul class="reorder-skips">
                            <template for:each={skippedLines} for:item="line">
                                <li key={line.key}>
                                    <span class="skip-name">{line.productName}</span>
                                    <span class="skip-reason">{line.reason}</span>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <div class="reorder-actions">
                        <button type="button" class="reorder-dismiss" onclick={dismissReorder}>Dismiss</button>
                    </div>
                </div>
            </template>

            <div class="det-card">

                <!-- Header + top Add-to-cart -->
                <div class="det-header">
                    <div class="det-header__main">
                        <p class="det-eyebrow">{heading}</p>
                        <h1 class="det-title">{quote.quoteNumber}</h1>
                        <template lwc:if={quote.name}>
                            <p class="det-subject">{quote.name}</p>
                        </template>
                    </div>
                    <div class="det-header__aside">
                        <span class={quote.badgeClass}>
                            <span class="qbadge__dot"></span>{quote.status}
                        </span>
                        <button type="button" class="btn-cart" onclick={handleAddToCart} disabled={addDisabled}>
                            <template lwc:if={isAdding}>
                                <span class="btn-spinner" aria-hidden="true"></span>{addBtnLabel}
                            </template>
                            <template lwc:else>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <circle cx="9" cy="21" r="1"></circle>
                                    <circle cx="20" cy="21" r="1"></circle>
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                </svg>
                                {addBtnLabel}
                            </template>
                        </button>
                    </div>
                </div>

                <!-- Overview -->
                <section class="det-section">
                    <h2 class="det-section__title">Overview</h2>
                    <dl class="det-grid">
                        <template lwc:if={quote.hasAccount}>
                            <div class="det-field">
                                <dt>Account name</dt>
                                <dd>{quote.accountName}</dd>
                            </div>
                        </template>
                        <template lwc:if={quote.hasEmail}>
                            <div class="det-field">
                                <dt>Email</dt>
                                <dd>{quote.email}</dd>
                            </div>
                        </template>
                        <template lwc:if={quote.hasStatus}>
                            <div class="det-field">
                                <dt>Status</dt>
                                <dd>{quote.status}</dd>
                            </div>
                        </template>
                    </dl>
                    <template lwc:if={quote.hasDescription}>
                        <div class="det-longtext-wrap">
                            <dt class="det-longtext-label">Description</dt>
                            <p class="det-longtext">{quote.description}</p>
                        </div>
                    </template>
                </section>

                <!-- Line items -->
                <section class="det-section">
                    <h2 class="det-section__title">Items</h2>
                    <template lwc:if={hasLines}>
                        <div class="qlines">
                            <template for:each={lines} for:item="line">
                                <div key={line.id} class="qline">
                                    <div class="qline__media">
                                        <template lwc:if={line.hasImage}>
                                            <img src={line.imageUrl} alt={line.productName}
                                                data-id={line.id} onerror={handleImageError} />
                                        </template>
                                        <template lwc:else>
                                            <div class="qline__noimg" aria-hidden="true">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                                    <path d="M21 15l-5-5L5 21"></path>
                                                </svg>
                                            </div>
                                        </template>
                                    </div>

                                    <div class="qline__info">
                                        <p class="qline__name">{line.productName}</p>
                                        <template lwc:if={line.productCode}>
                                            <p class="qline__code">Item #: {line.productCode}</p>
                                        </template>
                                        <p class="qline__unit">
                                            <lightning-formatted-number value={line.unitPrice}
                                                format-style="currency" currency-code={currencyCode}>
                                            </lightning-formatted-number>
                                            <span class="qline__each"> each</span>
                                        </p>
                                    </div>

                                    <div class="qline__qty">
                                        <button type="button" class="stepper" data-id={line.id}
                                            onclick={handleDecrement} aria-label="Decrease quantity">−</button>
                                        <input type="number" min="1" class="stepper__input"
                                            value={line.quantity} data-id={line.id} onchange={handleQtyInput} />
                                        <button type="button" class="stepper" data-id={line.id}
                                            onclick={handleIncrement} aria-label="Increase quantity">+</button>
                                    </div>

                                    <div class="qline__total">
                                        <lightning-formatted-number value={line.lineTotal}
                                            format-style="currency" currency-code={currencyCode}>
                                        </lightning-formatted-number>
                                    </div>
                                </div>
                            </template>
                        </div>

                    </template>
                    <template lwc:else>
                        <p class="det-longtext det-empty">This quote has no line items.</p>
                    </template>
                </section>

                <!-- Quote totals (live — reflect the quantities above) -->
                <template lwc:if={hasLines}>
                    <section class="det-section">
                        <h2 class="det-section__title">Quote totals</h2>
                        <dl class="det-grid">
                            <div class="det-field">
                                <dt>Subtotal</dt>
                                <dd>
                                    <lightning-formatted-number value={estimatedTotal}
                                        format-style="currency" currency-code={currencyCode}>
                                    </lightning-formatted-number>
                                </dd>
                            </div>
                            <template lwc:if={quote.hasTax}>
                                <div class="det-field">
                                    <dt>Tax</dt>
                                    <dd>
                                        <lightning-formatted-number value={quote.tax}
                                            format-style="currency" currency-code={currencyCode}>
                                        </lightning-formatted-number>
                                    </dd>
                                </div>
                            </template>
                            <template lwc:if={quote.hasShipping}>
                                <div class="det-field">
                                    <dt>Shipping &amp; handling</dt>
                                    <dd>
                                        <lightning-formatted-number value={quote.shippingHandling}
                                            format-style="currency" currency-code={currencyCode}>
                                        </lightning-formatted-number>
                                    </dd>
                                </div>
                            </template>
                            <div class="det-field det-field--total">
                                <dt>Grand total</dt>
                                <dd>
                                    <lightning-formatted-number value={liveGrandTotal}
                                        format-style="currency" currency-code={currencyCode}>
                                    </lightning-formatted-number>
                                </dd>
                            </div>
                        </dl>
                    </section>
                </template>
            </div>
        </template>

        <!-- ─── Empty / not found ─── -->
        <template lwc:if={showEmpty}>
            <div class="det-card">
                <div class="empty-state">
                    <lightning-icon icon-name="standard:quotes" size="large"></lightning-icon>
                    <p class="empty-title">Quote not available</p>
                    <p class="empty-text">
                        We couldn't find this quote, or it isn't associated with your account.
                    </p>
                    <button type="button" class="empty-btn" onclick={handleBack}>Back to quotes</button>
                </div>
            </div>
        </template>
    </div>
</template>
