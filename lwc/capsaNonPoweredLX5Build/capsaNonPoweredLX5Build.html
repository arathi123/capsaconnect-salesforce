<template>
    <div class="lx5-engine-container">

        <template if:true={isStorage}>
            <c-capsa-non-powered-l-x5-storage
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-capsa-non-powered-l-x5-storage>
        </template>

        <template if:true={isWarrantyService}>
            <c-capsa-non-powered-l-x5-warranty-service
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-capsa-non-powered-l-x5-warranty-service>
        </template>

        <template if:true={isAccessories}>
            <c-capsa-non-powered-l-x5-accessories
                product-type={productType}
                selections={selections}
                onstepcomplete={handleStepComplete}>
            </c-capsa-non-powered-l-x5-accessories>
        </template>

        <template if:true={isResult}>
            <c-capsa-non-powered-l-x5-result
                summary-data={summaryData}
                opportunity-id={opportunityId}
                quote-id={quoteId}>
            </c-capsa-non-powered-l-x5-result>
        </template>

    </div>
</template>
