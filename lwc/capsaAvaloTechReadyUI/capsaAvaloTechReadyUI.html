<template>

    <div class="path-wrapper">
        <c-cart-path-bar
            product-family={productType}
            current-step={currentStep}
            enabled-steps={allowedSteps}
            onchildevent={handlePathSelection}
            onbacktoproducts={handleResetFlow}>
        </c-cart-path-bar>
    </div>

    <template if:true={showLandingPage}>
        <div class="build-container">
            <div class="page-container fade-in">
                <h1 class="title">Avalo Tech Ready Product Configurator</h1>
                <h4 class="subtitle">Configure your Avalo Tech Ready cart based on workflow requirements.</h4>
                <hr>
                <p class="description slds-m-top_large">
                    Use this interactive configurator to build a custom Avalo Tech Ready cart.
                </p>
                <button class="build-btn slds-m-top_medium" onclick={handleBuildClick}>
                    START CONFIGURATION &rarr;
                </button>
            </div>
        </div>
    </template>

    <template if:true={showBuildYourOwn}>
        <c-capsa-avalo-tech-ready-build
            opportunity-id={opportunityId}
            product-type={productType}
            quote-id={quoteId}
            onstepchange={handleStepChange}
            onresetflow={handleResetFlow}>
        </c-capsa-avalo-tech-ready-build>
    </template>

</template>
