<template>

    <div class="results-page-container">

        <!-- LOADER -->
        <template if:true={isLoading}>

            <div class="full-page-loader">

                <lightning-spinner
                    alternative-text="Generating Quote..."
                    size="large"
                    variant="brand">
                </lightning-spinner>

            </div>

        </template>

        <!-- HEADER -->
        <div class="results-header">

            <h2 class="title">
                SAS Cabinets Configuration Results
            </h2>

            <hr class="header-divider" />

        </div>

        <div class="results-main-content">

            <!-- SKU -->
            <div class="summary-section">

                <h3 class="summary-title">
                    Generated Cabinet Code
                </h3>

                <div class="code-box">

                    <p class="cart-code">
                        {packageSku}
                    </p>

                </div>

            </div>

            <template if:true={isUnlistedCart}>

                <div class="slds-notify
                            slds-notify_alert
                            slds-theme_warning
                            slds-m-bottom_medium">

                    ⚠️ <b>Unlisted Cabinet:</b>

                    We don't have a product configured for this
                    cabinet combination. Quote line items may
                    not be created.

                </div>

            </template>

            <!-- CONFIG SUMMARY -->
            <div class="summary-section slds-m-top_large">

                <h3 class="summary-title">
                    Configuration Summary
                </h3>

                <ul class="summary-list">

                    <!-- CABINET LINE -->
                    <template if:true={selections.cabinetLine.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>Cabinet Line:</strong>

                            {selections.cabinetLine.label}

                        </li>

                    </template>

                    <!-- J HOOKS -->
                    <template if:true={selections.jHooks.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>J Hooks:</strong>

                            {selections.jHooks.label}

                        </li>

                    </template>

                    <!-- MATERIAL -->
                    <template if:true={selections.material.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>Material:</strong>

                            {selections.material.label}

                        </li>

                    </template>

                    <!-- DOOR KEY -->
                    <template if:true={selections.doorKeyType.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>Door & Key Type:</strong>

                            {selections.doorKeyType.label}

                        </li>

                    </template>

                    <!-- TOP -->
                    <template if:true={selections.top.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>Top:</strong>

                            {selections.top.label}

                        </li>

                    </template>

                    <!-- OPTION -->
                    <template if:true={selections.option.label}>

                        <li class="summary-item">

                            <span class="bullet">•</span>

                            <strong>Option:</strong>

                            {selections.option.label}

                        </li>

                    </template>

                </ul>

            </div>

            <!-- ACCESSORIES -->
            <template if:true={hasAccessories}>

                <div class="summary-section slds-m-top_large">

                    <h3 class="summary-title">
                        Selected Accessories
                    </h3>

                    <ul class="summary-list">

                        <template
                            for:each={selections.accessories}
                            for:item="acc">

                            <li
                                key={acc.optionKey}
                                class="summary-item">

                                <span class="bullet">•</span>

                                {acc.displayValue}

                            </li>

                        </template>

                    </ul>

                </div>

            </template>

            <!-- ACTION -->
        <div class="action-section slds-m-top_xx-large">

            <template if:true={isReconfigureMode}>

                <button
                    class="quote-btn"
                    onclick={handleUpdateQuote}>

                    UPDATE QUOTE

                </button>

            </template>

            <template if:false={isReconfigureMode}>

                <button
                    class="quote-btn"
                    onclick={handleQuoteRequest}>

                    REQUEST A QUOTE

                </button>

            </template>

        </div>

        </div>

    </div>

</template>
