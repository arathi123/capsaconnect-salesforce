<template>
    <div class="use-case-container fade-in">
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <div class="questions-column">
                <h2 class="title">Select Accessories</h2>
                <hr>
                <p class="slds-text-body_regular slds-m-bottom_medium"> Select any additional accessories for your cart.
                    You may select multiple. </p>
                <div class="options-list slds-m-top_medium">
                    <template for:each={accessoryOptions} for:item="opt">
                        <div key={opt.Option_Key__c}>
                            <div class={opt.cardClass} data-key={opt.Option_Key__c} onclick={handleAccessorySelect}>
                                <div class="card-content" style="display: flex; gap: 20px; align-items: flex-start;">
                                    <input type="checkbox" checked={opt.isChecked} readonly style="margin-top: 6px;" />
                                    <div class="text-block"
                                        style="display: flex; justify-content: space-between; align-items: center;">
                                        <div class="option-title">{opt.Option_Label__c}</div>
                                        <div if:true={opt.isVisible} class="option-desc fade-in"> {opt.Description__c}
                                        </div>
                                    </div>
                                    <template if:true={opt.Image_URL__c}>
                                        <img src={opt.Image_URL__c}
                                            style="width: 80px; height: 80px; object-fit: contain; border: 1px solid #ccc; border-radius: 4px;"
                                            alt={opt.Option_Label__c} />
                                    </template>
                                </div>
                            </div>
                            <hr>
                        </div>
                    </template>
                    <div class={noneCardClass} onclick={handleNoneSelect}>
                        <div class="card-content" style="display: flex; gap: 15px; align-items: center;">
                            <input type="checkbox" checked={isNoneSelected} readonly />
                            <div class="text-block">
                                <div class="option-title">None</div>
                            </div>
                        </div>
                    </div>
                    <hr>
                </div>
                <div class="footer-area fade-in">
                    <button class="next-btn" onclick={handleNext}>NEXT →</button>
                </div>
            </div>
            <div class="preview-column">
                <div class="sticky-preview">
                    <div class="image-box">YOUR SELECTION</div>
                    <div class="preview-sublabel">Representative Image</div>
                    <div class="canvas-container">
                        <img src={baseCartImage} alt="Configured Cart" class="base-cart-img" />
                    </div>
                    <div class="option-key"><strong>Accessories:</strong> {accessoriesString}</div>
                </div>
            </div>
        </template>
    </div>
</template>
